<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer | ART & BOOKS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a10;
  color:white;
}

/* TOP BAR */
.topbar{
  padding:15px;
  text-align:center;
  background:rgba(20,20,30,0.8);
  border-bottom:1px solid #222;
}

.topbar h1{
  margin:0;
  font-size:20px;
  letter-spacing:2px;
  color:gold;
}

/* VIEWER */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  height:90vh;
  padding:20px;
}

iframe{
  width:100%;
  height:100%;
  max-width:1000px;
  border:none;
  border-radius:12px;
  background:#111;
  box-shadow:0 0 30px rgba(0,0,0,0.7);
}

/* BUTTONS */
.btns{
  text-align:center;
  margin-top:10px;
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:gold;
  color:black;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <h1>ART & BOOKS VIEWER</h1>
</div>

<div class="btns">
  <button onclick="loadPDF('books/la-conoscenza-e-la-vita.pdf')">Book 1</button>
  <button onclick="loadPDF('books/znaenje-i-zivot.pdf')">Book 2</button>
</div>

<div class="container">
  <iframe id="viewer" src=""></iframe>
</div>

<script>
function loadPDF(file){
  document.getElementById('viewer').src = file;
}
</script>

</body>
</html>
